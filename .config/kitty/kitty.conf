# Themes
include ./theme.conf

# Kitty Mod
# `macos`: Ctrl+Shift (default)
# `linux`: Super
include ${KITTY_OS}.conf

# URL opener
open_url_modifiers ctrl

# Font Family ($ kitty list-fonts)
font_family      Fira Code
bold_font        Fira Code Bold
italic_font      Fira Code Italic
bold_italic_font Fira Code Bold Italic

# Bell
enable_audio_bell no

# Windows
window_padding_width 6
remember_window_size yes
# hide_window_decorations yes

# Clipboard (Copy)
clipboard_control write-clipboard write-primary no-append
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Increase font size
map ctrl+shift+equal change_font_size all +0.5
map ctrl+shift+plus change_font_size all +0.5
map ctrl+shift+kp_add change_font_size all +0.5

# Decrease font size
map ctrl+shift+minus change_font_size all -0.5
map ctrl+shift+kp_subtract change_font_size all -0.5

# Tabs - open a new window or tab with the same working directory as the current window?
map alt+t launch --cwd=current --type=tab
map f3 set_tab_title

# Tabs - navigation
map alt+left previous_tab
map alt+right next_tab
